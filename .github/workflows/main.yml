name: Postman Collection Workflow

on:
  push:
    branches: [main]

  workflow_dispatch:

  schedule:
    - cron: "30 02 * * *"   # 8:00 AM IST
    - cron: "00 14 * * *"   # 7:30 PM IST
    - cron: "00 06 * * 1-5" # 11:30 AM IST (Mon–Fri)

jobs:
  run-postman-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4.2.2

      - name: Install Node.js and npm
        uses: actions/setup-node@v3.9.1
        with:
          node-version: '22'

      - name: Install Newman and HTML Extra Reporter
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: Run the Postman Collection with Newman
        run: |
          newman run "InWarranty_flow Collection.postman_collection.json" \
          -e QA.postman_environment.json \
          -d testdata.csv \
          -r cli,htmlextra \
          --reporter-htmlextra-export newman/report.html

      - name: Upload Newman Report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Newman Report
          path: newman/report.html
        






           
      
